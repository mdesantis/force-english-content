name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      browser:
        description: "Target store to submit the extension to"
        type: choice
        options:
          - chrome
          - firefox
          - both
        default: both

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
        fail-fast: false
        matrix:
          command: ${{ fromJSON(github.event_name == 'workflow_dispatch' && (inputs.browser == 'chrome' && '["chrome"]' || inputs.browser == 'firefox' && '["firefox"]' || '["chrome", "firefox"]') || '["chrome", "firefox"]') }}
    steps:
      - name: Install build dependencies
        run: sudo apt-get -qq update && sudo apt-get install --no-install-recommends -y bash jq
      - name: Checkout
        uses: actions/checkout@v7
      - name: Use Node.js LTS
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          check-latest: true
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Submit
        run: |
          case ${{ matrix.command }} in
            chrome)
              npx chrome-webstore-upload-cli --source web-ext-artifacts/chrome/*.zip
              ;;
            firefox)
              npx web-ext sign --channel listed --source-dir dist-firefox --artifacts-dir web-ext-artifacts/firefox
              ;;
          esac
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          PUBLISHER_ID: ${{ vars.CHROME_PUBLISHER_ID }}
          WEB_EXT_API_KEY: ${{ secrets.AMO_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_API_SECRET }}
      - name: Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            web-ext-artifacts/chrome/*.zip
            web-ext-artifacts/firefox/*.zip
